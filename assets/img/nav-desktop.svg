<svg xmlns="http://www.w3.org/2000/svg" width="880" height="150" viewBox="0 0 880 150" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="barShadow" x="-10%" y="-30%" width="120%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- page backdrop -->
  <rect width="880" height="150" fill="#f9fafb"/>

  <!-- nav bar (.menux-container) -->
  <g filter="url(#barShadow)">
    <rect x="20" y="22" width="840" height="64" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  </g>

  <!-- logo -->
  <rect x="42" y="42" width="26" height="26" rx="7" fill="url(#cta)"/>
  <text x="78" y="60" font-size="17" font-weight="700" fill="#111827">Acme</text>

  <!-- links (.menux-link) -->
  <text x="250" y="59" font-size="14.5" font-weight="600" fill="#667eea">Home</text>
  <rect x="248" y="70" width="40" height="2.5" rx="1.25" fill="#667eea"/>

  <text x="320" y="59" font-size="14.5" fill="#374151">Features</text>
  <text x="408" y="59" font-size="14.5" fill="#374151">Pricing</text>
  <text x="485" y="59" font-size="14.5" fill="#374151">Blog</text>

  <!-- link with badge (.menux-badge) -->
  <text x="545" y="59" font-size="14.5" fill="#374151">Docs</text>
  <rect x="592" y="38" width="34" height="17" rx="8.5" fill="#ef4444"/>
  <text x="609" y="50.5" font-size="10.5" font-weight="700" fill="#ffffff" text-anchor="middle">New</text>

  <!-- search icon (.menux-search-btn) -->
  <g stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="690" cy="54" r="7"/><line x1="699" y1="63" x2="703" y2="67"/>
  </g>

  <!-- CTA button item (.menux-cta-btn) -->
  <rect x="728" y="38" width="112" height="32" rx="6" fill="url(#cta)"/>
  <text x="784" y="58.5" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">Get Started</text>

  <!-- caption -->
  <text x="20" y="120" font-size="12.5" fill="#9ca3af">Desktop navigation bar — server-rendered &lt;nav class="menux-container"&gt; with links, "New" badge, search and a CTA button item.</text>
</svg>
