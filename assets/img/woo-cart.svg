<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="card" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="880" height="400" fill="#f9fafb"/>

  <!-- nav bar -->
  <rect x="20" y="20" width="840" height="56" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="42" y="38" width="24" height="20" rx="6" fill="url(#acc)"/>
  <text x="76" y="53" font-size="15" font-weight="700" fill="#111827">Acme</text>
  <text x="250" y="53" font-size="14" fill="#374151">Home</text>
  <text x="320" y="53" font-size="14" fill="#374151">Shop</text>
  <text x="396" y="53" font-size="14" fill="#374151">About</text>

  <!-- cart icon (.menux-woo-cart) with count badge #ef4444 -->
  <g transform="translate(792,36)">
    <g fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3 h4 l3 15 h14 l3 -10 H8"/>
      <circle cx="11" cy="23" r="2.2" fill="#374151"/><circle cx="22" cy="23" r="2.2" fill="#374151"/>
    </g>
    <circle cx="26" cy="2" r="9" fill="#ef4444"/>
    <text x="26" y="6" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  </g>

  <!-- connector -->
  <path d="M806 70 l-6 14 h12 Z" fill="#ffffff" stroke="#e5e7eb"/>

  <!-- mini-cart dropdown (.menux-minicart) -->
  <g filter="url(#card)">
    <rect x="568" y="84" width="292" height="270" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  </g>

  <!-- item 1 -->
  <rect x="588" y="104" width="48" height="48" rx="8" fill="#eef2ff"/>
  <rect x="600" y="116" width="24" height="24" rx="4" fill="#667eea"/>
  <text x="648" y="120" font-size="13.5" font-weight="600" fill="#111827">Wireless Headphones</text>
  <text x="648" y="139" font-size="12" fill="#6b7280">1 × €89.00</text>
  <text x="840" y="124" font-size="13" font-weight="700" fill="#111827" text-anchor="end">€89.00</text>
  <line x1="588" y1="168" x2="840" y2="168" stroke="#f0f0f3"/>

  <!-- item 2 -->
  <rect x="588" y="180" width="48" height="48" rx="8" fill="#eef2ff"/>
  <circle cx="612" cy="204" r="13" fill="#764ba2"/>
  <text x="648" y="196" font-size="13.5" font-weight="600" fill="#111827">USB-C Cable (2m)</text>
  <text x="648" y="215" font-size="12" fill="#6b7280">2 × €12.50</text>
  <text x="840" y="200" font-size="13" font-weight="700" fill="#111827" text-anchor="end">€25.00</text>
  <line x1="588" y1="244" x2="840" y2="244" stroke="#f0f0f3"/>

  <!-- subtotal -->
  <text x="588" y="272" font-size="13.5" font-weight="600" fill="#374151">Subtotal</text>
  <text x="840" y="272" font-size="15" font-weight="800" fill="#111827" text-anchor="end">€114.00</text>

  <!-- buttons -->
  <rect x="588" y="294" width="120" height="40" rx="8" fill="#eef2ff"/>
  <text x="648" y="319" font-size="13" font-weight="600" fill="#667eea" text-anchor="middle">View cart</text>
  <rect x="720" y="294" width="120" height="40" rx="8" fill="url(#acc)"/>
  <text x="780" y="319" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Checkout</text>

  <text x="20" y="384" font-size="12" fill="#9ca3af">WooCommerce cart icon with live count badge + mini-cart dropdown (items, subtotal, view-cart / checkout).</text>
</svg>
