<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="modal" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- backdrop (#menux-search-backdrop) -->
  <rect width="720" height="460" fill="#0f172a"/>
  <rect width="720" height="460" fill="#000000" opacity="0.35"/>

  <!-- search box (#menux-search-box) -->
  <g filter="url(#modal)">
    <rect x="110" y="56" width="500" height="348" rx="16" fill="#ffffff"/>
  </g>

  <!-- header: magnifier + input + close -->
  <g stroke="#667eea" stroke-width="2.4" fill="none" stroke-linecap="round">
    <circle cx="146" cy="92" r="8"/><line x1="155" y1="101" x2="161" y2="107"/>
  </g>
  <text x="178" y="98" font-size="16" fill="#9ca3af">menu builder</text>
  <line x1="178" y1="110" x2="280" y2="110" stroke="#667eea" stroke-width="1.5"/>
  <g stroke="#9ca3af" stroke-width="2" stroke-linecap="round">
    <line x1="566" y1="86" x2="578" y2="98"/><line x1="578" y1="86" x2="566" y2="98"/>
  </g>
  <line x1="110" y1="124" x2="610" y2="124" stroke="#eef0f3"/>

  <!-- tabs (.bm-sm-tab) -->
  <rect x="134" y="138" width="120" height="34" rx="17" fill="#eef2ff"/>
  <text x="194" y="160" font-size="13" font-weight="600" fill="#667eea" text-anchor="middle">🔗 Menu</text>
  <text x="300" y="160" font-size="13" fill="#6b7280">📄 In page</text>

  <!-- results with highlighted match (<mark>) -->
  <g>
    <rect x="134" y="190" width="452" height="40" rx="9" fill="#f9fafb"/>
    <circle cx="158" cy="210" r="4" fill="#667eea"/>
    <text x="176" y="215" font-size="14" fill="#111827">Menu </text>
    <rect x="218" y="201" width="56" height="18" rx="3" fill="#fde68a"/>
    <text x="246" y="215" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">Builder</text>
  </g>
  <g>
    <circle cx="158" cy="258" r="4" fill="#9ca3af"/>
    <text x="176" y="263" font-size="14" fill="#374151">Mega </text>
    <rect x="218" y="249" width="62" height="18" rx="3" fill="#fde68a"/>
    <text x="249" y="263" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">Menu</text>
    <text x="288" y="263" font-size="14" fill="#374151"> settings</text>
  </g>
  <g>
    <circle cx="158" cy="298" r="4" fill="#9ca3af"/>
    <text x="176" y="303" font-size="14" fill="#374151">Mobile </text>
    <rect x="232" y="289" width="60" height="18" rx="3" fill="#fde68a"/>
    <text x="262" y="303" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">menu</text>
    <text x="298" y="303" font-size="14" fill="#374151"> styles</text>
  </g>

  <line x1="110" y1="340" x2="610" y2="340" stroke="#eef0f3"/>
  <!-- footer kbd hints (.bm-sm-footer) -->
  <g font-size="11.5" fill="#6b7280">
    <rect x="134" y="356" width="22" height="18" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/><text x="145" y="369" text-anchor="middle">↑</text>
    <rect x="160" y="356" width="22" height="18" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/><text x="171" y="369" text-anchor="middle">↓</text>
    <text x="190" y="369">navigate</text>
    <rect x="270" y="356" width="22" height="18" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/><text x="281" y="369" text-anchor="middle">↵</text>
    <text x="300" y="369">open</text>
    <rect x="350" y="356" width="34" height="18" rx="4" fill="#f3f4f6" stroke="#e5e7eb"/><text x="367" y="369" text-anchor="middle">Esc</text>
    <text x="392" y="369">close</text>
    <text x="586" y="369" text-anchor="end" fill="#9ca3af">3 results</text>
  </g>
</svg>
