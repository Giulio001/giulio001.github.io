<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <filter id="panel" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="880" height="420" fill="#f9fafb"/>

  <!-- nav bar -->
  <rect x="20" y="20" width="840" height="56" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <rect x="42" y="38" width="24" height="20" rx="6" fill="url(#acc)"/>
  <text x="76" y="53" font-size="15" font-weight="700" fill="#111827">Acme</text>
  <text x="250" y="53" font-size="14" fill="#374151">Home</text>
  <!-- active item with mega open (.menux-has-mega) -->
  <text x="320" y="53" font-size="14" font-weight="600" fill="#667eea">Products</text>
  <path d="M385 49 l5 5 l5 -5" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <text x="430" y="53" font-size="14" fill="#374151">Solutions</text>
  <text x="520" y="53" font-size="14" fill="#374151">Pricing</text>

  <!-- mega panel (Menux_MegaMenu::render_panel) bottom-rounded 14 -->
  <g filter="url(#panel)">
    <path d="M20 76 H860 V378 a14 14 0 0 1 -14 14 H34 a14 14 0 0 1 -14 -14 Z" fill="#ffffff" stroke="#e5e7eb"/>
  </g>
  <rect x="20" y="76" width="840" height="3" fill="url(#acc)"/>

  <!-- 4 columns -->
  <!-- col 1 -->
  <text x="58" y="116" font-size="11.5" font-weight="700" fill="#9ca3af" letter-spacing="1">ANALYTICS</text>
  <g>
    <circle cx="64" cy="146" r="13" fill="#eef2ff"/><path d="M59 146 h10 M64 141 v10" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
    <text x="86" y="143" font-size="13.5" font-weight="600" fill="#111827">Dashboards</text>
    <text x="86" y="159" font-size="11.5" fill="#6b7280">Real-time metrics</text>
  </g>
  <g>
    <circle cx="64" cy="192" r="13" fill="#eef2ff"/><path d="M59 196 l4 -6 l3 4 l4 -7" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round"/>
    <text x="86" y="189" font-size="13.5" font-weight="600" fill="#111827">Reports</text>
    <text x="86" y="205" font-size="11.5" fill="#6b7280">Export to PDF/CSV</text>
  </g>
  <g>
    <circle cx="64" cy="238" r="13" fill="#eef2ff"/><circle cx="64" cy="238" r="4" fill="none" stroke="#667eea" stroke-width="2"/>
    <text x="86" y="235" font-size="13.5" font-weight="600" fill="#111827">Funnels</text>
    <text x="86" y="251" font-size="11.5" fill="#6b7280">Track conversions</text>
  </g>

  <!-- divider -->
  <line x1="232" y1="100" x2="232" y2="360" stroke="#f0f0f3"/>

  <!-- col 2 -->
  <text x="268" y="116" font-size="11.5" font-weight="700" fill="#9ca3af" letter-spacing="1">AUTOMATION</text>
  <g fill="#111827">
    <circle cx="274" cy="142" r="4" fill="#667eea"/><text x="290" y="146" font-size="13.5" font-weight="600">Workflows</text>
    <circle cx="274" cy="174" r="4" fill="#667eea"/><text x="290" y="178" font-size="13.5" font-weight="600">Triggers</text>
    <circle cx="274" cy="206" r="4" fill="#667eea"/><text x="290" y="210" font-size="13.5" font-weight="600">Integrations</text>
    <circle cx="274" cy="238" r="4" fill="#667eea"/><text x="290" y="242" font-size="13.5" font-weight="600">Webhooks</text>
  </g>

  <line x1="442" y1="100" x2="442" y2="360" stroke="#f0f0f3"/>

  <!-- col 3 -->
  <text x="478" y="116" font-size="11.5" font-weight="700" fill="#9ca3af" letter-spacing="1">RESOURCES</text>
  <g fill="#111827">
    <circle cx="484" cy="142" r="4" fill="#667eea"/><text x="500" y="146" font-size="13.5" font-weight="600">Documentation</text>
    <circle cx="484" cy="174" r="4" fill="#667eea"/><text x="500" y="178" font-size="13.5" font-weight="600">API Reference</text>
    <circle cx="484" cy="206" r="4" fill="#667eea"/><text x="500" y="210" font-size="13.5" font-weight="600">Community</text>
    <circle cx="484" cy="238" r="4" fill="#667eea"/><text x="500" y="242" font-size="13.5" font-weight="600">Changelog</text>
  </g>

  <line x1="652" y1="100" x2="652" y2="360" stroke="#f0f0f3"/>

  <!-- col 4 — image/promo block -->
  <rect x="686" y="108" width="150" height="92" rx="10" fill="url(#acc)"/>
  <text x="761" y="148" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">What's new</text>
  <text x="761" y="168" font-size="11" fill="#e0e7ff" text-anchor="middle">v3.8 release →</text>
  <rect x="686" y="214" width="150" height="34" rx="6" fill="#eef2ff"/>
  <text x="761" y="235" font-size="12" font-weight="600" fill="#667eea" text-anchor="middle">View all products →</text>

  <text x="20" y="408" font-size="12" fill="#9ca3af">Mega menu open — full-width panel, up to 4 columns of links, headings, icons, descriptions and an image/promo block.</text>
</svg>
