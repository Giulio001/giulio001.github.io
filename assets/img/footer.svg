<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="fgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13203b"/><stop offset="1" stop-color="#0b1426"/>
    </linearGradient>
    <clipPath id="fcard"><rect x="20" y="20" width="840" height="300" rx="14"/></clipPath>
    <filter id="stshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="880" height="372" fill="#f9fafb"/>

  <g clip-path="url(#fcard)">
    <rect x="20" y="20" width="840" height="300" fill="url(#fgrad)"/>
    <!-- accent top bar (default #6366f1) -->
    <rect x="20" y="20" width="840" height="4" fill="#6366f1"/>

    <!-- About section (.menux-fcol-about) -->
    <rect x="48" y="54" width="18" height="18" rx="5" fill="#6366f1"/>
    <text x="74" y="69" font-size="17" font-weight="700" fill="#f8fafc">Acme</text>
    <text x="48" y="102" font-size="12.5" fill="#94a3b8">Beautiful navigation &amp;</text>
    <text x="48" y="122" font-size="12.5" fill="#94a3b8">footers, built visually —</text>
    <text x="48" y="142" font-size="12.5" fill="#94a3b8">no code required.</text>

    <!-- Links section (.menux-fcol-links) -->
    <text x="340" y="66" font-size="11.5" font-weight="700" letter-spacing="0.8" fill="#f8fafc">QUICK LINKS</text>
    <text x="340" y="100" font-size="13" fill="#cbd5e1">Home</text>
    <text x="340" y="126" font-size="13" fill="#cbd5e1">Features</text>
    <text x="340" y="152" font-size="13" fill="#cbd5e1">Pricing</text>
    <text x="340" y="178" font-size="13" fill="#cbd5e1">Blog</text>

    <!-- Contact section (.menux-fcol-contact) -->
    <text x="500" y="66" font-size="11.5" font-weight="700" letter-spacing="0.8" fill="#f8fafc">CONTACT</text>
    <circle cx="506" cy="96" r="3.2" fill="#6366f1"/><text x="520" y="100" font-size="12.5" fill="#94a3b8">123 Market Street</text>
    <circle cx="506" cy="126" r="3.2" fill="#6366f1"/><text x="520" y="130" font-size="12.5" fill="#cbd5e1">+1 (555) 010-0199</text>
    <circle cx="506" cy="156" r="3.2" fill="#6366f1"/><text x="520" y="160" font-size="12.5" fill="#cbd5e1">hello@acme.com</text>

    <!-- Social section (.menux-fcol-social, circle badges) -->
    <text x="680" y="66" font-size="11.5" font-weight="700" letter-spacing="0.8" fill="#f8fafc">FOLLOW US</text>
    <circle cx="692" cy="104" r="13" fill="#6366f1" fill-opacity="0.16"/><text x="692" y="109" font-size="12" font-weight="700" fill="#cbd5e1" text-anchor="middle">f</text>
    <circle cx="726" cy="104" r="13" fill="#6366f1" fill-opacity="0.16"/><text x="726" y="109" font-size="11" font-weight="700" fill="#cbd5e1" text-anchor="middle">X</text>
    <circle cx="760" cy="104" r="13" fill="#6366f1" fill-opacity="0.16"/><text x="760" y="108" font-size="9.5" font-weight="700" fill="#cbd5e1" text-anchor="middle">in</text>
    <circle cx="794" cy="104" r="13" fill="#6366f1" fill-opacity="0.16"/><path d="M789 99 l8 5 l-8 5 z" fill="#cbd5e1"/>

    <!-- scroll-to-top button (.menux-scroll-top) -->
    <g filter="url(#stshadow)"><circle cx="824" cy="232" r="15" fill="#6366f1"/></g>
    <path d="M818 236 l6 -6 l6 6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- bottom bar (.menux-footer-bottom) -->
    <line x1="20" y1="280" x2="860" y2="280" stroke="#ffffff" stroke-opacity="0.08"/>
    <rect x="20" y="280" width="840" height="40" fill="#0a101f"/>
    <text x="48" y="305" font-size="12" fill="#64748b">© 2026 Acme. All rights reserved.</text>
    <text x="700" y="305" font-size="12" fill="#64748b">Privacy</text>
    <text x="762" y="305" font-size="12" fill="#64748b">Terms</text>
    <text x="816" y="305" font-size="12" fill="#64748b">Cookies</text>
  </g>

  <text x="20" y="350" font-size="12" fill="#9ca3af">Footer Builder — a multi-column footer (Midnight theme) with About, Links, Contact and Social sections, a bottom bar and a scroll-to-top button.</text>
</svg>