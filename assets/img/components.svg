<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/><stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="880" height="300" fill="#f9fafb"/>

  <!-- Badges card -->
  <rect x="20" y="20" width="270" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="40" y="48" font-size="12" font-weight="700" fill="#9ca3af" letter-spacing="1">TEXT BADGES</text>
  <text x="40" y="86" font-size="14" fill="#374151">Docs</text>
  <rect x="84" y="72" width="34" height="18" rx="9" fill="#ef4444"/><text x="101" y="85" font-size="10.5" font-weight="700" fill="#fff" text-anchor="middle">New</text>
  <text x="138" y="86" font-size="14" fill="#374151">Sale</text>
  <rect x="178" y="72" width="34" height="18" rx="9" fill="#f59e0b"/><text x="195" y="85" font-size="10.5" font-weight="700" fill="#fff" text-anchor="middle">Hot</text>
  <text x="40" y="120" font-size="11.5" fill="#9ca3af">color + background configurable per item</text>

  <!-- Notification dot card -->
  <rect x="305" y="20" width="270" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="325" y="48" font-size="12" font-weight="700" fill="#9ca3af" letter-spacing="1">NOTIFICATION DOT</text>
  <text x="325" y="90" font-size="15" fill="#374151">Messages</text>
  <circle cx="416" cy="74" r="5" fill="#ef4444"/>
  <text x="325" y="120" font-size="11.5" fill="#9ca3af">tiny dot + hidden screen-reader text</text>

  <!-- CTA button card -->
  <rect x="590" y="20" width="270" height="120" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="610" y="48" font-size="12" font-weight="700" fill="#9ca3af" letter-spacing="1">CTA BUTTON ITEM</text>
  <rect x="610" y="66" width="120" height="38" rx="6" fill="url(#acc)"/>
  <text x="670" y="90" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">Book Now</text>
  <rect x="742" y="66" width="100" height="38" rx="19" fill="url(#acc)"/>
  <text x="792" y="90" font-size="13.5" font-weight="600" fill="#ffffff" text-anchor="middle">Sign up</text>
  <text x="610" y="124" font-size="11.5" fill="#9ca3af">bg / text / hover / border-radius per item</text>

  <!-- Dropdown indicators card -->
  <rect x="20" y="156" width="840" height="124" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="40" y="184" font-size="12" font-weight="700" fill="#9ca3af" letter-spacing="1">DROPDOWN INDICATORS</text>

  <!-- triangle -->
  <text x="60" y="232" font-size="14" fill="#374151">Products</text>
  <path d="M130 226 l6 8 l6 -8 Z" fill="#667eea"/>
  <text x="60" y="258" font-size="11.5" fill="#9ca3af">Triangle</text>

  <!-- chevron -->
  <text x="270" y="232" font-size="14" fill="#374151">Products</text>
  <path d="M340 226 l6 7 l6 -7" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round"/>
  <text x="270" y="258" font-size="11.5" fill="#9ca3af">Chevron</text>

  <!-- dot -->
  <text x="480" y="232" font-size="14" fill="#374151">Products</text>
  <circle cx="552" cy="229" r="4" fill="#667eea"/>
  <text x="480" y="258" font-size="11.5" fill="#9ca3af">Dot</text>

  <!-- none -->
  <text x="690" y="232" font-size="14" fill="#374151">Products</text>
  <text x="690" y="258" font-size="11.5" fill="#9ca3af">None</text>
</svg>
